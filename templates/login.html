<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SaduTyping</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-black: #050505;
            --electric-blue: #1E6BE2;
            --cyan-glow: #3FC7FF;
            --logo-gradient: linear-gradient(135deg, var(--electric-blue), var(--cyan-glow));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            background-color: var(--deep-black);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        #network-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 50px;
            border-radius: 24px;
            width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(30, 107, 226, 0.15);
            text-align: center;
        }

        /* Added Styling for the Image Logo */
        .company-logo-img {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(63, 199, 255, 0.3));
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sadu { color: #ffffff; }
        .typing {
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        .field { margin-bottom: 24px; text-align: left; }
        
        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--cyan-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--electric-blue);
            background: rgba(30, 107, 226, 0.05);
            box-shadow: 0 0 20px rgba(30, 107, 226, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--logo-gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 10px 30px rgba(30, 107, 226, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <canvas id="network-canvas"></canvas>

    <div class="login-card">
        <!-- IMAGE LOGO ADDED HERE -->
        <img src="{{ url_for('static', filename='logocom.png') }}" alt="Company Logo" class="company-logo-img">
        
        <div class="brand-logo">
            <span class="sadu">SADU</span><span class="typing">TYPING</span>
        </div>
        <p class="subtitle">Next-Gen Speed Trainer</p>
        
        <form action="/login" method="POST">
            <div class="field">
                <label>User Identity</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            
            <div class="field">
                <label>Access Key</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">INITIALIZE SESSION</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1E6BE2";
            ctx.strokeStyle = "rgba(63, 199, 255, 0.15)";

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
